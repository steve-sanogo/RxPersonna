<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphes de personnages — Asimov</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root {
    --bg: #06080f;
    --surface: #0d1117;
    --surface2: #131924;
    --border: #1e2d45;
    --accent: #c9a84c;
    --accent2: #4cc9c9;
    --accent3: #a84cc9;
    --text: #d4c9b0;
    --muted: #5a6a7e;
    --node-lca: #c9a84c;
    --node-paf: #4cc9c9;
    --edge: rgba(180, 160, 100, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Text', serif;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Star field background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(1px 1px at 10% 20%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 70%, rgba(76,201,201,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(201,168,76,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 50%, rgba(76,201,201,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 30%, rgba(201,168,76,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 85%, rgba(76,201,201,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 65%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 80%, rgba(76,201,201,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 40%, rgba(255,255,255,0.1) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 55%, rgba(255,255,255,0.08) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 25%, rgba(255,255,255,0.06) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,0.07) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Nebula glow */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 40% at 15% 50%, rgba(201,168,76,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 85% 30%, rgba(76,201,201,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 50% 90%, rgba(168,76,201,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .layout {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 300px 1fr;
    grid-template-rows: auto 1fr;
    height: 100vh;
  }

  /* HEADER */
  .header {
    grid-column: 1 / -1;
    padding: 18px 32px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(6,8,15,0.8);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: baseline;
    gap: 20px;
  }

  .header-title {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, var(--accent) 0%, #f0d080 50%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  /* SIDEBAR */
  .sidebar {
    background: rgba(13,17,23,0.85);
    border-right: 1px solid var(--border);
    backdrop-filter: blur(16px);
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    overflow-y: auto;
  }

  .control-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .control-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* Book selector */
  .book-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .book-tab {
    padding: 10px 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s ease;
    text-align: center;
  }

  .book-tab:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .book-tab.active-lca {
    background: rgba(201,168,76,0.12);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(201,168,76,0.15);
  }

  .book-tab.active-paf {
    background: rgba(76,201,201,0.12);
    border-color: var(--accent2);
    color: var(--accent2);
    box-shadow: 0 0 12px rgba(76,201,201,0.15);
  }

  .book-tab-title {
    font-size: 13px;
    font-weight: 600;
    display: block;
  }

  .book-tab-subtitle {
    font-family: 'Crimson Text', serif;
    font-size: 10px;
    font-style: italic;
    opacity: 0.7;
    display: block;
    margin-top: 2px;
  }

  /* Chapter selector */
  .chapter-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 5px;
  }

  .chap-btn {
    aspect-ratio: 1;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .chap-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .chap-btn.active-lca {
    background: rgba(201,168,76,0.2);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
    box-shadow: 0 0 8px rgba(201,168,76,0.2);
  }

  .chap-btn.active-paf {
    background: rgba(76,201,201,0.2);
    border-color: var(--accent2);
    color: var(--accent2);
    font-weight: 600;
    box-shadow: 0 0 8px rgba(76,201,201,0.2);
  }

  /* Stats panel */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
  }

  .stat-value {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 600;
    line-height: 1;
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 3px;
  }

  /* Top characters */
  .char-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .char-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 3px;
    background: var(--surface2);
    border: 1px solid transparent;
    transition: border-color 0.15s;
  }

  .char-row:hover {
    border-color: var(--border);
  }

  .char-rank {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    width: 14px;
    flex-shrink: 0;
  }

  .char-bar-wrap {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .char-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .char-name {
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 120px;
  }

  .char-weight {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
  }

  /* GRAPH AREA */
  .graph-area {
    position: relative;
    overflow: hidden;
    background: transparent;
  }

  #graph-svg {
    width: 100%;
    height: 100%;
  }

  .node-circle {
    cursor: pointer;
    transition: filter 0.2s;
  }

  .node-circle:hover {
    filter: brightness(1.4);
  }

  .node-label {
    font-family: 'Crimson Text', serif;
    font-size: 12px;
    fill: var(--text);
    pointer-events: none;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    paint-order: stroke fill;
    stroke: rgba(6,8,15,0.85);
    stroke-width: 3px;
    stroke-linejoin: round;
  }

  .edge-line {
    stroke: rgba(201,168,76,0.25);
    pointer-events: none;
  }

  /* Tooltip */
  .tooltip {
    position: absolute;
    background: rgba(13,17,23,0.95);
    border: 1px solid var(--border);
    padding: 10px 14px;
    border-radius: 6px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 220px;
    backdrop-filter: blur(8px);
    z-index: 100;
  }

  .tooltip.visible { opacity: 1; }

  .tooltip-name {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 5px;
  }

  .tooltip-aliases {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    line-height: 1.4;
    margin-bottom: 5px;
  }

  .tooltip-degree {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
  }

  /* Chapter title overlay */
  .chapter-overlay {
    position: absolute;
    bottom: 24px;
    right: 24px;
    text-align: right;
    pointer-events: none;
  }

  .chapter-id {
    font-family: 'Cinzel', serif;
    font-size: 42px;
    font-weight: 700;
    opacity: 0.06;
    letter-spacing: 0.06em;
    line-height: 1;
  }

  /* Loading state */
  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
  }

  .loading-ring {
    width: 36px;
    height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Legend */
  .legend {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 4px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
  }

  .empty-state-icon {
    font-size: 48px;
    opacity: 0.2;
  }

  .empty-state-text {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    opacity: 0.4;
  }
</style>
</head>
<body>

<div class="layout">
  <header class="header">
    <div class="header-title">RÉSEAU DE PERSONNAGES</div>
    <div class="header-sub">Co-occurrences par chapitre · Isaac Asimov</div>
    <div style="margin-left:auto;" class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--node-lca)"></div>
        <span>Les Cavernes d'Acier</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--node-paf)"></div>
        <span>Prélude à Foundation</span>
      </div>
    </div>
  </header>

  <aside class="sidebar">
    <div class="control-section">
      <div class="control-label">Ouvrage</div>
      <div class="book-tabs">
        <button class="book-tab active-lca" data-book="lca" onclick="selectBook('lca')">
          <span class="book-tab-title">LCA</span>
          <span class="book-tab-subtitle">Les Cavernes d'Acier</span>
        </button>
        <button class="book-tab" data-book="paf" onclick="selectBook('paf')">
          <span class="book-tab-title">PAF</span>
          <span class="book-tab-subtitle">Prélude à Foundation</span>
        </button>
      </div>
    </div>

    <div class="control-section">
      <div class="control-label">Chapitre</div>
      <div class="chapter-grid" id="chapter-grid"></div>
    </div>

    <div class="control-section">
      <div class="control-label">Statistiques</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-nodes" style="color:var(--accent)">—</div>
          <div class="stat-label">Personnages</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-edges" style="color:var(--accent2)">—</div>
          <div class="stat-label">Liens</div>
        </div>
        <div class="stat-card" style="grid-column: 1 / -1;">
          <div class="stat-value" id="stat-density" style="color:var(--accent3); font-size:18px">—</div>
          <div class="stat-label">Poids total des interactions</div>
        </div>
      </div>
    </div>

    <div class="control-section">
      <div class="control-label">Personnages principaux</div>
      <div class="char-list" id="char-list">
        <div style="font-size:12px;color:var(--muted);text-align:center;padding:12px 0;font-style:italic;">
          Sélectionnez un chapitre
        </div>
      </div>
    </div>
  </aside>

  <main class="graph-area">
    <div class="loading" id="loading-state">
      <div>Sélectionnez un chapitre pour visualiser le graphe</div>
    </div>
    <svg id="graph-svg"></svg>
    <div class="tooltip" id="tooltip"></div>
    <div class="chapter-overlay">
      <div class="chapter-id" id="chapter-id-display"></div>
    </div>
  </main>
</div>

function parseGraphML(xmlStr) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlStr, 'application/xml');
  const ns = 'http://graphml.graphdrawing.org/xmlns';

  const nodes = [];
  const edges = [];
  const nodeMap = {};

  doc.querySelectorAll('graph > node').forEach(n => {
    const id = n.getAttribute('id');
    const dataEl = n.querySelector('data[key="d0"]');
    const names = dataEl ? dataEl.textContent.split(';').map(s => s.trim()).filter(Boolean) : [id];
    nodes.push({ id, label: id, aliases: names, degree: 0 });
    nodeMap[id] = nodes[nodes.length - 1];
  });

  doc.querySelectorAll('graph > edge').forEach(e => {
    const src = e.getAttribute('source');
    const tgt = e.getAttribute('target');
    const dataEl = e.querySelector('data[key="d1"]');
    const weight = dataEl ? parseInt(dataEl.textContent) || 1 : 1;
    edges.push({ source: src, target: tgt, weight });
    if (nodeMap[src]) nodeMap[src].degree += weight;
    if (nodeMap[tgt]) nodeMap[tgt].degree += weight;
  });

  return { nodes, edges };
}

// UI SETUP
// ============================================================
function selectBook(book) {
  currentBook = book;
  currentChapter = null;

  // Update tabs
  document.querySelectorAll('.book-tab').forEach(t => {
    t.className = 'book-tab';
    if (t.dataset.book === book) t.classList.add(`active-${book}`);
  });

  buildChapterGrid();
  clearGraph();
  resetStats();
}

function buildChapterGrid() {
  const grid = document.getElementById('chapter-grid');
  const chapters = Object.keys(GRAPH_DATA[currentBook]).map(Number).sort((a,b) => a-b);
  grid.innerHTML = '';
  chapters.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'chap-btn';
    btn.textContent = c;
    btn.dataset.chapter = c;
    btn.onclick = () => selectChapter(c);
    grid.appendChild(btn);
  });
}

function selectChapter(chap) {
  currentChapter = chap;

  document.querySelectorAll('.chap-btn').forEach(b => {
    b.className = 'chap-btn';
    if (parseInt(b.dataset.chapter) === chap) b.classList.add(`active-${currentBook}`);
  });

  const xmlStr = GRAPH_DATA[currentBook][String(chap)];
  if (!xmlStr) return;

  const { nodes, edges } = parseGraphML(xmlStr);
  renderGraph(nodes, edges);
  updateStats(nodes, edges);
  updateCharList(nodes);

  document.getElementById('chapter-id-display').textContent = `${currentBook.toUpperCase()}${chap}`;
  document.getElementById('loading-state').style.display = 'none';
}

function resetStats() {
  document.getElementById('stat-nodes').textContent = '—';
  document.getElementById('stat-edges').textContent = '—';
  document.getElementById('stat-density').textContent = '—';
  document.getElementById('char-list').innerHTML = `
    <div style="font-size:12px;color:var(--muted);text-align:center;padding:12px 0;font-style:italic;">
      Sélectionnez un chapitre
    </div>`;
  document.getElementById('chapter-id-display').textContent = '';
}

function updateStats(nodes, edges) {
  document.getElementById('stat-nodes').textContent = nodes.length;
  document.getElementById('stat-edges').textContent = edges.length;
  const totalWeight = edges.reduce((s, e) => s + e.weight, 0);
  document.getElementById('stat-density').textContent = totalWeight;
}

function updateCharList(nodes) {
  const sorted = [...nodes].sort((a,b) => b.degree - a.degree).slice(0, 7);
  const maxDeg = sorted[0]?.degree || 1;
  const color = BOOK_META[currentBook].color;
  const colorFade = BOOK_META[currentBook].colorFade;

  const listEl = document.getElementById('char-list');
  listEl.innerHTML = sorted.map((n, i) => `
    <div class="char-row">
      <span class="char-rank">${i+1}</span>
      <div class="char-bar-wrap">
        <div class="char-bar" style="width:${(n.degree/maxDeg*100).toFixed(1)}%;background:${color}"></div>
      </div>
      <span class="char-name" style="color:${color}">${n.label}</span>
      <span class="char-weight">${n.degree}</span>
    </div>
  `).join('');
}

// ============================================================
// D3 GRAPH RENDERING
// ============================================================
function clearGraph() {
  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();
  if (simulation) { simulation.stop(); simulation = null; }
  document.getElementById('loading-state').style.display = 'flex';
  document.getElementById('loading-state').innerHTML = '<div>Sélectionnez un chapitre pour visualiser le graphe</div>';
}

function renderGraph(nodes, edges) {
  const color = BOOK_META[currentBook].color;
  const colorFade = BOOK_META[currentBook].colorFade;
  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();

  const W = svg.node().clientWidth || 900;
  const H = svg.node().clientHeight || 600;

  const maxDeg = Math.max(...nodes.map(n => n.degree), 1);
  const maxWeight = Math.max(...edges.map(e => e.weight), 1);

  // Radius scale
  const rScale = d3.scaleSqrt().domain([0, maxDeg]).range([5, 28]);
  // Edge width scale
  const wScale = d3.scaleLinear().domain([1, maxWeight]).range([0.5, 5]);

  // Container with zoom
  const g = svg.append('g');

  const zoom = d3.zoom()
    .scaleExtent([0.3, 5])
    .on('zoom', event => g.attr('transform', event.transform));

  svg.call(zoom);

  // Force simulation
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges).id(d => d.id).distance(d => 80 + (maxWeight - d.weight) * 3).strength(0.7))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide().radius(d => rScale(d.degree) + 8));

  // Edges
  const link = g.append('g').selectAll('line')
    .data(edges).join('line')
    .attr('class', 'edge-line')
    .attr('stroke-width', d => wScale(d.weight))
    .attr('stroke', d => `${colorFade}${(0.1 + (d.weight / maxWeight) * 0.5).toFixed(2)})`);

  // Node groups
  const nodeGroup = g.append('g').selectAll('g')
    .data(nodes).join('g')
    .attr('cursor', 'pointer')
    .call(d3.drag()
      .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.2).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  // Glow filter
  const defs = svg.append('defs');
  const filter = defs.append('filter').attr('id', 'glow');
  filter.append('feGaussianBlur').attr('stdDeviation', '3.5').attr('result', 'coloredBlur');
  const feMerge = filter.append('feMerge');
  feMerge.append('feMergeNode').attr('in', 'coloredBlur');
  feMerge.append('feMergeNode').attr('in', 'SourceGraphic');

  // Node halo
  nodeGroup.append('circle')
    .attr('r', d => rScale(d.degree) + 3)
    .attr('fill', `${colorFade}0.05)`)
    .attr('stroke', `${colorFade}0.15)`)
    .attr('stroke-width', 1);

  // Node circle
  nodeGroup.append('circle')
    .attr('class', 'node-circle')
    .attr('r', d => rScale(d.degree))
    .attr('fill', d => {
      const t = d.degree / maxDeg;
      return d3.interpolateRgb('#2a1f08', color)(t);
    })
    .attr('stroke', color)
    .attr('stroke-width', 1.5)
    .attr('filter', 'url(#glow)');

  // Labels
  nodeGroup.append('text')
    .attr('class', 'node-label')
    .attr('dy', d => rScale(d.degree) + 14)
    .attr('text-anchor', 'middle')
    .text(d => d.label)
    .style('font-size', d => d.degree > maxDeg * 0.5 ? '13px' : '11px');

  // Tooltip
  const tooltip = document.getElementById('tooltip');

  nodeGroup
    .on('mouseover', (event, d) => {
      const aliases = d.aliases.filter(a => a !== d.label).join(', ');
      tooltip.innerHTML = `
        <div class="tooltip-name" style="color:${color}">${d.label}</div>
        ${aliases ? `<div class="tooltip-aliases">${aliases}</div>` : ''}
        <div class="tooltip-degree">Poids total : ${d.degree}</div>
      `;
      tooltip.classList.add('visible');

      // Highlight connected
      const connected = new Set([d.id]);
      edges.forEach(e => {
        if (e.source.id === d.id || e.target.id === d.id) {
          connected.add(e.source.id || e.source);
          connected.add(e.target.id || e.target);
        }
      });

      nodeGroup.style('opacity', n => connected.has(n.id) ? 1 : 0.2);
      link.style('opacity', e => {
        const sid = e.source.id || e.source;
        const tid = e.target.id || e.target;
        return (sid === d.id || tid === d.id) ? 1 : 0.05;
      });
    })
    .on('mousemove', event => {
      const rect = document.querySelector('.graph-area').getBoundingClientRect();
      tooltip.style.left = (event.clientX - rect.left + 12) + 'px';
      tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
    })
    .on('mouseout', () => {
      tooltip.classList.remove('visible');
      nodeGroup.style('opacity', 1);
      link.style('opacity', 1);
    });

  // Simulation tick
  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);

    nodeGroup.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

// ============================================================
// INIT
// ============================================================
selectBook('lca');
</script>
</body>
</html>
